    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalRGB WLED Matrix Pixel Art Painter</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1e1e1e;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        #controls {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #tools {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button,
        input[type="radio"]+label {
            padding: 8px 16px;
            background-color: #7066e0;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover,
        input[type="radio"]+label:hover {
            background-color: rgb(100, 89, 221);
        }

        input[type="radio"] {
            position: absolute !important;
            clip: rect(0, 0, 0, 0);
            height: 1px;
            width: 1px;
            border: 0;
            overflow: hidden;
        }

        input[type="radio"]:checked+label {
            background-color: rgb(100, 89, 221);
        }

        .input-group {
            display: flex;
        }

        .input-group input,
        .input-group button {
            flex-grow: 1;
        }

        .input-group input:first-child,
        .input-group label:first-child,
        .input-group button:first-child {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            border-right: 0px solid #555;
        }

        .input-group input:last-child,
        .input-group label:last-child,
        .input-group button:last-child {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .input-group input:not(:first-child):not(:last-child),
        .input-group label:not(:first-child):not(:last-child),
        .input-group button:not(:first-child):not(:last-child) {
            border-radius: 0;
        }

        input[type="number"] {
            width: 50px;
            padding: 8px;
            border-radius: 4px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
        }

        select {
            padding: 8px;
            border-radius: 4px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
        }

        #canvas-container {
            border: 2px solid #555;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
        }

        #matrix-info {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }

        .label {
            margin-right: 5px;
            font-size: 14px;
        }

        .swal2-html-container code {
            display: block;
            padding: 20px 50px;
            border-radius: 4px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            font-size: 12px;
        }

        .code-container {
            position: relative;
        }

        .copy-code {
            padding: 4px 8px;
            position: absolute;
            top: 5px;
            right: 5px;
            background: transparent;
            border: 1px solid #555;
        }

        .language-selector {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .force-border-radius {
            border-top-left-radius: 4px !important;
            border-bottom-left-radius: 4px !important;
        }

        .nudgeX {
            animation: nudgeX-animation 0.3s ease-in-out;
        }

        .nudgeY {
            animation: nudgeY-animation 0.3s ease-in-out;
        }

        @keyframes nudgeX-animation {
            0% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-10px);
            }

            40% {
                transform: translateX(10px);
            }

            60% {
                transform: translateX(-5px);
            }

            80% {
                transform: translateX(5px);
            }

            100% {
                transform: translateX(0);
            }
        }

        @keyframes nudgeY-animation {
            0% {
                transform: translateY(0);
            }

            20% {
                transform: translateY(-10px);
            }

            40% {
                transform: translateY(10px);
            }

            60% {
                transform: translateY(-5px);
            }

            80% {
                transform: translateY(5px);
            }

            100% {
                transform: translateY(0);
            }
        }
    </style>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        const mousePosDisplay = document.getElementById('mouse-pos');
        const cellSizeDisplay = document.getElementById('cell-size');

        // Matrix dimensions
        let COLS = parseInt($('#size-cols').val());
        let ROWS = parseInt($('#size-rows').val());
        let cellWidth, cellHeight;

        // Matrix data - stores color for each cell
        let matrixData = Array(ROWS).fill().map(() => Array(COLS).fill('#000000'));

        // Drawing state
        let isDrawing = false;
        let currentMode = $('input[name="draw-mode"]:checked').val();

        // Resize the canvas to fill the screen while maintaining aspect ratio
        function resizeCanvas() {
            const maxWidth = window.innerWidth * 0.9;
            const maxHeight = window.innerHeight * 0.6;

            // Calculate the cell size to fit the matrix in the available space
            const cellWidthByWidth = maxWidth / COLS;
            const cellHeightByHeight = maxHeight / ROWS;

            // Use the smaller of the two to ensure the entire matrix fits
            const cellSize = Math.floor(Math.min(cellWidthByWidth, cellHeightByHeight));

            cellWidth = cellSize;
            cellHeight = cellSize;

            canvas.width = COLS * cellWidth;
            canvas.height = ROWS * cellHeight;

            cellSizeDisplay.textContent = `${getCorrectTranslation(15)} ${cellWidth}x${cellHeight}`;

            // Redraw the matrix with the current data
            drawMatrix();
        }

        // Draw the entire matrix
        function drawMatrix() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw each cell
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const x = col * cellWidth;
                    const y = row * cellHeight;

                    // Draw the cell background
                    ctx.fillStyle = matrixData[row][col];
                    ctx.fillRect(x, y, cellWidth, cellHeight);

                    // Draw the cell border
                    ctx.strokeStyle = '#333333';
                    ctx.strokeRect(x, y, cellWidth, cellHeight);
                }
            }
        }

        // Convert mouse position to matrix coordinates
        function getMatrixCoords(event) {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            const col = Math.floor(x / cellWidth);
            const row = Math.floor(y / cellHeight);

            // Make sure we're within bounds
            if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
                return { row, col };
            }

            return null;
        }

        // Update a cell's color
        function updateCell(row, col, color) {
            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                matrixData[row][col] = color;

                // Redraw just this cell
                const x = col * cellWidth;
                const y = row * cellHeight;

                ctx.fillStyle = color;
                ctx.fillRect(x, y, cellWidth, cellHeight);

                ctx.strokeStyle = '#333333';
                ctx.strokeRect(x, y, cellWidth, cellHeight);
            }
        }

        // Fill all cells with a specific color
        function fillAll(color) {
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    matrixData[row][col] = color;
                }
            }
            drawMatrix();
        }

        //Invert all cells
        function invertAll() {
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (matrixData[row][col] == '#ffffff') {
                        matrixData[row][col] = '#000000';
                    } else {
                        matrixData[row][col] = '#ffffff';
                    }
                }
            }
            drawMatrix();
        }

        function mirrorHorizontal() {
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS / 2; col++) {
                    matrixData[row][COLS - col - 1] = matrixData[row][col];
                }
            }
            drawMatrix();
        }

        function mirrorVertical() {
            for (let row = 0; row < ROWS / 2; row++) {
                for (let col = 0; col < COLS; col++) {
                    matrixData[ROWS - row - 1][col] = matrixData[row][col];
                }
            }
            drawMatrix();
        }

        function copyToClipboard(text) {
            var $temp = $('<input>');
            $('body').append($temp);
            $temp.val(text).select();
            document.execCommand('copy');
            $temp.remove();

            Swal.fire({
                position: "top-end",
                icon: "success",
                theme: "dark",
                title: getCorrectTranslation(19),
                showConfirmButton: false,
                timer: 1500
            });
        }

        function moveUp() {
            for (let row = 0; row < ROWS - 1; row++) {
                for (let col = 0; col < COLS; col++) {
                    matrixData[row][col] = matrixData[row + 1][col];
                    matrixData[row + 1][col] = '#000000';
                }
            }
            drawMatrix();
            nudgeY();
        }

        function moveDown() {
            for (let row = ROWS - 1; row > 0; row--) {
                for (let col = 0; col < COLS; col++) {
                    matrixData[row][col] = matrixData[row - 1][col];
                    matrixData[row - 1][col] = '#000000';
                }
            }
            drawMatrix();
            nudgeY();
        }

        function moveLeft() {
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS - 1; col++) {
                    matrixData[row][col] = matrixData[row][col + 1];
                    matrixData[row][col + 1] = '#000000';
                }
            }
            drawMatrix();
            nudgeX();
        }

        function moveRight() {
            for (let row = 0; row < ROWS; row++) {
                for (let col = COLS - 1; col > 0; col--) {
                    matrixData[row][col] = matrixData[row][col - 1];
                    matrixData[row][col - 1] = '#000000';
                }
            }
            drawMatrix();
            nudgeX();
        }

        function nudgeX() {
            $('#canvas-container').addClass('nudgeX');

            setTimeout(() => {
                $('#canvas-container').removeClass('nudgeX');
            }, 700);
        }

        function nudgeY() {
            $('#canvas-container').addClass('nudgeY');

            setTimeout(() => {
                $('#canvas-container').removeClass('nudgeY');
            }, 700);
        }

        // Export matrix data as JSON
        function exportData() {
            const dataStr = JSON.stringify(matrixData).replaceAll('"#ffffff"', '1').replaceAll('"#000000"', '0');
            
            Swal.fire({
                title: getCorrectTranslation(16),
                icon: "success",
                theme: "dark",
                html: `<div class="code-container"><code>${dataStr}</code><button class="copy-code" onclick="copyToClipboard(${dataStr});">${getCorrectTranslation(17)}</button></div>`,
                showCloseButton: false,
                showCancelButton: false,
                focusConfirm: false,
                confirmButtonText: getCorrectTranslation(18),
                confirmButtonAriaLabel: 'OK',
                cancelButtonText: 'Cancel',
                cancelButtonAriaLabel: "Thumbs down"
            });
        }
        
        
        
        
        
        
        
        
        
        function setCookie(name, value, days) {
        let expires = "";
        if (days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
            document.cookie = name + "=" + (value || "") + expires + "; path=/";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i = 0; i < ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) === ' ') c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        function saveMatrixToCookie(matrix, cookieName, daysToExpire) {
            const matrixString = JSON.stringify(matrix);
            setCookie(cookieName, matrixString, daysToExpire);
        }

        function getMatrixFromCookie(cookieName) {
            const matrixString = getCookie(cookieName);
            return matrixString ? JSON.parse(matrixString) : null;
        }
        
        function deleteCookie(name) {
            document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            return true;
        }
        
        async function saveData() {
            const dataStr = JSON.stringify(matrixData).replaceAll('"#ffffff"', '1').replaceAll('"#000000"', '0');
            const { value: cookieName } = await Swal.fire({
                title: "Drawing name",
                input: "text",
                showCancelButton: true,
                inputValidator: (value) => {
                    if (!value) {
                        return "You need to write something!";
                    }
                }
            });
            
            if (cookieName) {
                const date = new Date();
                date.setTime(date.getTime() + (365 * 24 * 60 * 60 * 1000));
                const expires = "expires=" + date.toUTCString();
                document.cookie = `${cookieName}=${dataStr}; expires=${expires}; path=/`;
                Swal.fire(`Drawing saved as ${cookieName}`);
            }
        }
        
        async function openData() {
            const cookies = Object.fromEntries(document.cookie.split('; ').map(cookie => cookie.split('=')));
            const { value: drawing } = await Swal.fire({
                title: "Open drawing",
                input: "select",
                inputOptions: Object.fromEntries(Object.keys(cookies).map(key => [key, key])),
                inputPlaceholder: " ",
                showCancelButton: true,
            });
            if (drawing) {
                const dataStr = getCookie(drawing);
                console.log(dataStr);
                matrixData = JSON.parse(dataStr);
                matrixData = matrixData.map(row => row.map(value => value === 0 ? "#000000" : "#ffffff"));
                drawMatrix();
                //Swal.fire(`You selected: ${drawing}`);
            }
        }
        
        async function deleteData() {
            const cookies = Object.fromEntries(document.cookie.split('; ').map(cookie => cookie.split('=')));
            const { value: drawing } = await Swal.fire({
                title: "Delete drawing",
                input: "select",
                inputOptions: Object.fromEntries(Object.keys(cookies).map(key => [key, key])),
                inputPlaceholder: " ",
                showCancelButton: true,
            });
            if (drawing) {
                const ans = deleteCookie(drawing);
                Swal.fire(`${drawing} deleted!`);
            }
        }
        
       
        // Event listeners
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const coords = getMatrixCoords(e);
            if (coords) {
                switch (currentMode) {
                    case 'draw':
                        updateCell(coords.row, coords.col, '#ffffff');
                        break;
                    case 'fill':
                        fillAll('#ffffff');
                        break;
                    case 'clear':
                        updateCell(coords.row, coords.col, '#000000');
                        break;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const coords = getMatrixCoords(e);
            if (coords) {

                mousePosDisplay.textContent = `${getCorrectTranslation(14)} (${coords.col}, ${coords.row})`;

                if (isDrawing) {
                    switch (currentMode) {
                        case 'draw':
                            updateCell(coords.row, coords.col, '#ffffff');
                            break;
                        case 'clear':
                            updateCell(coords.row, coords.col, '#000000');
                            break;
                    }
                }
            } else {
                mousePosDisplay.textContent = getCorrectTranslation(12);
            }
        });

        canvas.addEventListener('mouseout', () => {
            mousePosDisplay.textContent = getCorrectTranslation(12);
        });

        window.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        window.addEventListener('resize', resizeCanvas);

        // Initial setup
        resizeCanvas();

        $(document).keydown(function (e) {
            switch (e.which) {
                case 37: // left arrow key
                    moveLeft();
                    break;
                case 38: // up arrow key
                    moveUp();
                    break;
                case 39: // right arrow key
                    moveRight();
                    break;
                case 40: // down arrow key
                    moveDown();
                    break;
                default: return; // exit this handler for other keys
            }

            e.preventDefault(); // prevent the default action (scroll / move caret)
        });
    </script>
